<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Multimodas - Inventario Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.database = {};
        window.userId = null;
        
        window.saveToCloud = async (newItems) => {
            try {
                localStorage.setItem('multimodas_inventory', JSON.stringify(newItems));
            } catch (e) { console.warn("No se pudo usar localStorage", e); }
        };

        try {
            const localData = localStorage.getItem('multimodas_inventory');
            if (localData) {
                window.database = JSON.parse(localData);
            }

            if (typeof __firebase_config !== 'undefined') {
                const firebaseConfig = JSON.parse(__firebase_config);
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'multimodas-scanner';
                
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        window.userId = user.uid;
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'inventory', 'main');
                        const docSnap = await getDoc(docRef);
                        if (docSnap.exists() && Object.keys(window.database).length === 0) {
                            window.database = docSnap.data().items || {};
                            if (typeof updateUI === 'function') updateUI(Object.keys(window.database).length);
                        }
                    } else {
                        initAuth();
                    }
                });

                window.saveToCloud = async (newItems) => {
                    try { localStorage.setItem('multimodas_inventory', JSON.stringify(newItems)); } catch(e){}
                    if (!window.userId) return;
                    const docRef = doc(db, 'artifacts', appId, 'users', window.userId, 'inventory', 'main');
                    await setDoc(docRef, { items: newItems });
                };
            }
        } catch(e) {
            console.error("Error inicializando DB:", e);
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        #reader { 
            border: none !important; 
            width: 100% !important; 
            height: 280px;
            background: #000; 
            border-radius: 2.5rem; 
            overflow: hidden;
            position: relative;
        }

        #reader video { 
            border-radius: 2.5rem !important; 
            object-fit: cover !important; 
            width: 100% !important;
            height: 100% !important;
            playsinline: true !important;
            -webkit-playsinline: true !important;
        }

        video::-webkit-media-controls { display:none !important; }
        #reader__dashboard { display: none !important; }

        .tab-active { background: white; border-radius: 0.75rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); color: #111827; }
        .btn-primary { background: #111827; color: white; padding: 1.25rem; border-radius: 1.5rem; font-weight: 800; transition: all 0.2s; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .btn-primary:active { transform: scale(0.95); }
        
        .scan-line {
            position: absolute;
            top: 50%;
            left: 5%;
            width: 90%;
            height: 4px;
            background: rgba(59, 130, 246, 0.8);
            box-shadow: 0 0 20px rgba(59, 130, 246, 1);
            animation: moveLine 1.2s infinite ease-in-out;
            z-index: 10;
            border-radius: 4px;
            pointer-events: none;
        }
        @keyframes moveLine {
            0%, 100% { transform: translateY(-70px); opacity: 0.5; }
            50% { transform: translateY(70px); opacity: 1; }
        }

        .focus-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%; /* Súper ancho para que quepa todo el código largo */
            height: 160px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
            z-index: 5;
            pointer-events: none;
        }

        /* Estilo para el slider de zoom */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ffffff;
            margin-top: -10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 2px;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .mic-active {
            animation: pulse-red 1.5s infinite;
            background-color: #ef4444 !important;
            color: white !important;
        }
    </style>
</head>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-4 bg-gray-900 text-white rounded-2xl text-[10px] font-black uppercase opacity-0 pointer-events-none transition-all duration-300 shadow-2xl z-[100] tracking-widest">
        MENSAJE
    </div>

    <script>
        let html5QrCode;
        let recognition;
        let voiceTimeout;
        let videoTrack = null;
        let isTorchOn = false;
        let isMagenta = false;

        function textToNumbers(text) {
            const numMap = {
                'cero': 0, 'uno': 1, 'dos': 2, 'tres': 3, 'cuatro': 4, 'cinco': 5, 
                'seis': 6, 'siete': 7, 'ocho': 8, 'nueve': 9, 'diez': 10, 
                'once': 11, 'doce': 12, 'trece': 13, 'catorce': 14, 'quince': 15, 
                'dieciseis': 16, 'dieciséis': 16, 'diecisiete': 17, 'dieciocho': 18, 'diecinueve': 19, 
                'veinte': 20, 'veintiuno': 21, 'veintidos': 22, 'veintidós': 22, 
                'veintitres': 23, 'veintitrés': 23, 'veinticuatro': 24, 'veinticinco': 25, 
                'veintiseis': 26, 'veintiséis': 26, 'veintisiete': 27, 'veintiocho': 28, 'veintinueve': 29,
                'treinta': 30, 'cuarenta': 40, 'cincuenta': 50, 'sesenta': 60, 
                'setenta': 70, 'ochenta': 80, 'noventa': 90
            };
            let parsed = text.toLowerCase();
            parsed = parsed.replace(/(treinta|cuarenta|cincuenta|sesenta|setenta|ochenta|noventa)\s+y\s+(uno|dos|tres|cuatro|cinco|seis|siete|ocho|nueve)/g, (match, p1, p2) => {
                return (numMap[p1] + numMap[p2]).toString();
            });
            for (const [word, digit] of Object.entries(numMap)) {
                const regex = new RegExp(`\\b${word}\\b`, 'gi');
                parsed = parsed.replace(regex, digit);
            }
            return parsed;
        }

        const initSpeech = () => {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!window.SpeechRecognition) {
                document.getElementById('voice-btn').style.display = 'none';
                return;
            }
            recognition = new window.SpeechRecognition();
            recognition.interimResults = true;
            recognition.lang = 'es-GT';

            recognition.onresult = (event) => {
                let transcript = Array.from(event.results).map(result => result[0].transcript).join('');
                transcript = textToNumbers(transcript);
                document.getElementById('manual-code').value = transcript.toUpperCase();
                clearTimeout(voiceTimeout);
                voiceTimeout = setTimeout(() => {
                    recognition.stop();
                    searchManual();
                }, 1200); // 1.2 segundos para mejor exactitud sin ser muy lento
            };

            recognition.onstart = () => {
                document.getElementById('voice-btn').classList.add('mic-active');
                document.getElementById('voice-status').classList.remove('hidden');
            };

            recognition.onend = () => {
                document.getElementById('voice-btn').classList.remove('mic-active');
                document.getElementById('voice-status').classList.add('hidden');
            };
        };

        function toggleVoiceDictation() {
            if (!recognition) return;
            try { recognition.start(); } catch(e) { recognition.stop(); }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.innerText = msg;
            toast.style.opacity = "1";
            toast.style.transform = "translate(-50%, -15px)";
            setTimeout(() => { toast.style.opacity = "0"; toast.style.transform = "translate(-50%, 0px)"; }, 3000);
        }

        function switchTab(tab) {
            const isScan = tab === 'scan';
            document.getElementById('section-scan').classList.toggle('hidden', !isScan);
            document.getElementById('section-data').classList.toggle('hidden', isScan);
            document.getElementById('tab-scan').classList.toggle('tab-active', isScan);
            document.getElementById('tab-scan').classList.toggle('text-gray-500', !isScan);
            document.getElementById('tab-data').classList.toggle('tab-active', !isScan);
            document.getElementById('tab-data').classList.toggle('text-gray-500', isScan);
            if (isScan) handleCameraModeChange();
            else stopScanner();
        }

        async function handleExcel(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    
                    let targetSheetName = workbook.SheetNames.find(name => 
                        name.toLowerCase().includes('codigos') && name.toLowerCase().includes('comercial')
                    );
                    if (!targetSheetName) targetSheetName = workbook.SheetNames[0];

                    const sheet = workbook.Sheets[targetSheetName];
                    const json = XLSX.utils.sheet_to_json(sheet);
                    const newDb = {};
                    
                    json.forEach(row => {
                        const keys = Object.keys(row);
                        // Se agregó 'cestilo' a la búsqueda de código
                        const cK = keys.find(k => k.trim().toLowerCase() === 'codigo') || keys.find(k => /cod|id|bar|cestilo/i.test(k)) || keys[0];
                        // Se agregó 'pv' a la búsqueda de precio
                        const pK = keys.find(k => k.trim().toLowerCase() === 'precio') || keys.find(k => /pre|val|cost|monto|pv/i.test(k)) || keys[1];

                        const codeRaw = row[cK];
                        const priceRaw = row[pK];

                        if (codeRaw !== undefined && priceRaw !== undefined) {
                            const code = String(codeRaw).trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
                            let v = parseFloat(String(priceRaw).replace(/[^\d.,]/g, '').replace(',', '.'));
                            
                            if (code && !isNaN(v)) {
                                newDb[code] = Math.round(v).toString();
                            }
                        }
                    });
                    
                    window.database = newDb;
                    updateUI(Object.keys(newDb).length);
                    if (window.saveToCloud) await window.saveToCloud(newDb);
                    showToast(`${Object.keys(newDb).length} PRODUCTOS GUARDADOS`);
                    switchTab('scan');
                } catch (err) { 
                    showToast("ERROR AL LEER EL ARCHIVO"); 
                }
                finally { input.value = ""; }
            };
            reader.readAsArrayBuffer(file);
        }

        const patchVideoForIOS = () => {
            const readerDiv = document.getElementById('reader');
            const observer = new MutationObserver((mutations) => {
                mutations.forEach(mu => {
                    mu.addedNodes.forEach(node => {
                        if (node.tagName === 'VIDEO') {
                            const stream = node.srcObject;
                            if(stream) {
                                videoTrack = stream.getVideoTracks()[0];
                                const caps = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
                                
                                if(caps.torch) document.getElementById('torch-button')?.classList.remove('hidden');
                                
                                // Habilitar slider de zoom si el dispositivo lo soporta
                                if(caps.zoom) {
                                    const zoomContainer = document.getElementById('zoom-container');
                                    const zoomSlider = document.getElementById('zoom-slider');
                                    
                                    zoomContainer.classList.remove('hidden');
                                    
                                    // Configurar límites de zoom
                                    zoomSlider.min = caps.zoom.min;
                                    zoomSlider.max = Math.min(caps.zoom.max, 5.0); // Máximo 5x para no perder calidad
                                    zoomSlider.step = 0.1;
                                    
                                    // Establecer zoom inicial a 1.5x
                                    const startZoom = Math.max(caps.zoom.min, Math.min(1.5, zoomSlider.max));
                                    zoomSlider.value = startZoom;
                                    
                                    setTimeout(() => videoTrack.applyConstraints({ advanced: [{ zoom: startZoom }] }).catch(() => {}), 500);

                                    // Evento cuando se mueve la barra
                                    zoomSlider.addEventListener('input', (e) => {
                                        if (videoTrack) {
                                            videoTrack.applyConstraints({ advanced: [{ zoom: parseFloat(e.target.value) }] }).catch(() => {});
                                        }
                                    });
                                }
                            }
                        }
                    });
                });
            });
            observer.observe(readerDiv, { childList: true, subtree: true });
        };

        async function toggleTorch() {
            if (!videoTrack) return;
            try {
                isTorchOn = !isTorchOn;
                await videoTrack.applyConstraints({ advanced: [{ torch: isTorchOn }] });
            } catch (err) {}
        }

        function handleCameraModeChange() {
            const isCont = document.getElementById('camera-continuous')?.checked;
            document.getElementById('result-container')?.classList.add('hidden');
            document.getElementById('not-found')?.classList.add('hidden');
            
            if (isCont) {
                document.getElementById('manual-trigger-container')?.classList.add('hidden');
                document.getElementById('camera-ui-container')?.classList.remove('hidden');
                startScanner(false);
            } else {
                stopScanner();
                document.getElementById('camera-ui-container')?.classList.add('hidden');
                document.getElementById('manual-trigger-container')?.classList.remove('hidden');
            }
        }

        async function stopScanner() {
            isTorchOn = false;
            document.getElementById('torch-button')?.classList.add('hidden');
            document.getElementById('zoom-container')?.classList.add('hidden'); // Ocultar slider al parar
            if (html5QrCode && (html5QrCode.getState() === 2 || html5QrCode.getState() === 3)) {
                await html5QrCode.stop().catch(() => {});
                html5QrCode = null;
                videoTrack = null;
            }
        }

        async function startScanner(isManualCall = false) {
            const isCont = document.getElementById('camera-continuous')?.checked;
            if (!isCont && !isManualCall) return;
            
            document.getElementById('manual-trigger-container')?.classList.add('hidden');
            document.getElementById('camera-ui-container')?.classList.remove('hidden');
            document.getElementById('result-container')?.classList.add('hidden');
            document.getElementById('not-found')?.classList.add('hidden');
            
            if (html5QrCode && html5QrCode.getState() === 2) return;
            
            html5QrCode = new Html5Qrcode("reader", { 
                formatsToSupport: [ 
                    Html5QrcodeSupportedFormats.CODE_128, 
                    Html5QrcodeSupportedFormats.CODE_39, 
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.EAN_8,
                    Html5QrcodeSupportedFormats.UPC_A
                ] 
            });
            
            const config = { 
                fps: 15, 
                qrbox: (vw, vh) => ({ width: vw * 0.95, height: vh * 0.6 }), // Abarca casi toda la pantalla
                videoConstraints: { 
                    facingMode: "environment",
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                } 
            };
            
            html5QrCode.start({ facingMode: "environment" }, config, (txt) => {
                if (html5QrCode.getState() !== 2) return;
                findProduct(txt);
                
                if (!document.getElementById('camera-continuous')?.checked) {
                    setTimeout(() => {
                        stopScanner(); 
                        document.getElementById('camera-ui-container')?.classList.add('hidden');
                        document.getElementById('btn-new-scan')?.classList.remove('hidden');
                    }, 0);
                }
            }).catch(() => {});
        }

        function findProduct(code) {
            const clean = String(code).trim().toUpperCase().replace(/\s/g, '').replace(/[.]/g, '');
            let matchedKey = null;

            if (window.database[clean]) {
                matchedKey = clean;
            } else {
                const dbKeys = Object.keys(window.database).sort((a, b) => b.length - a.length);
                for (let i = 0; i < dbKeys.length; i++) {
                    if (clean.includes(dbKeys[i])) {
                        matchedKey = dbKeys[i];
                        break;
                    }
                }
            }

            if (matchedKey) {
                document.getElementById('res-code').innerText = `ID: ${matchedKey}`;
                document.getElementById('res-price').innerText = `Q${window.database[matchedKey]}`;
                
                const resCard = document.getElementById('result-card');
                if (isMagenta) {
                    resCard.classList.remove('bg-gray-900');
                    resCard.classList.add('bg-fuchsia-700');
                } else {
                    resCard.classList.remove('bg-fuchsia-700');
                    resCard.classList.add('bg-gray-900');
                }
                isMagenta = !isMagenta;

                document.getElementById('result-container').classList.remove('hidden');
                document.getElementById('not-found').classList.add('hidden');
            } else {
                document.getElementById('result-container').classList.add('hidden');
                document.getElementById('not-found').classList.remove('hidden');
                if (!document.getElementById('camera-continuous')?.checked) {
                    document.getElementById('btn-new-scan')?.classList.remove('hidden');
                    setTimeout(() => {
                        stopScanner();
                        document.getElementById('camera-ui-container')?.classList.add('hidden');
                    }, 0);
                }
            }
        }

        function resetManualScan() {
            document.getElementById('btn-new-scan').classList.add('hidden');
            document.getElementById('result-container').classList.add('hidden');
            document.getElementById('not-found').classList.add('hidden');
            document.getElementById('camera-ui-container').classList.remove('hidden');
            startScanner(true);
        }

        function searchManual() {
            // Limpiamos espacios, puntos y signos del dictado antes de evaluar
            let inp = document.getElementById('manual-code').value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            
            // Si después de limpiar nos quedan solo números, agregamos "MM" al inicio
            if (/^\d+$/.test(inp)) {
                inp = "MM" + inp;
            }
            
            // Reflejamos en la interfaz lo que realmente va a buscar
            document.getElementById('manual-code').value = inp;
            
            if (inp) findProduct(inp);
        }

        function updateUI(count) {
            const st = document.getElementById('db-status');
            const pr = document.getElementById('data-preview');
            if (count > 0) {
                st.innerText = `${count} PRODUCTOS`;
                st.className = "text-[10px] font-bold px-3 py-1.5 rounded-full bg-green-50 text-green-600 border border-green-100 tracking-wider";
                let h = "";
                Object.keys(window.database).slice(0, 15).forEach(k => { h += `<div class="flex justify-between py-2 border-b border-gray-50 italic"><span>${k}</span><b>Q${window.database[k]}</b></div>`; });
                pr.innerHTML = h;
            } else {
                st.innerText = "Sin Datos";
                st.className = "text-[10px] font-bold px-3 py-1.5 rounded-full bg-red-100 text-red-600 border border-red-200 tracking-wider";
                pr.innerHTML = "Base vacía.";
            }
        }

        async function clearData() {
            window.database = {};
            updateUI(0);
            if (window.saveToCloud) await window.saveToCloud({});
            showToast("DATOS ELIMINADOS");
        }

        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                stopScanner();
            } else {
                const isScanTab = !document.getElementById('section-scan').classList.contains('hidden');
                const isContinuous = document.getElementById('camera-continuous')?.checked;
                const hasResult = !document.getElementById('result-container').classList.contains('hidden');
                const hasNotFound = !document.getElementById('not-found').classList.contains('hidden');
                
                if (isScanTab && isContinuous && !hasResult && !hasNotFound) {
                    setTimeout(() => startScanner(false), 300);
                }
            }
        });

        window.addEventListener('load', () => {
            const loader = document.getElementById('loading-screen');
            if(loader) loader.style.display = 'none';
            
            updateUI(Object.keys(window.database).length);
            patchVideoForIOS();
            handleCameraModeChange(); 
            initSpeech();
        });
    </script>
</body>
</html>
